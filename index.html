<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>太平洋寿险辽宁分公司2025-2026年度表彰会签到系统</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%; max-width: 380px; padding: 45px 28px 85px;
            border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center; position: relative; display: none;
        }

        .card-logo { position: absolute; bottom: 25px; right: 28px; max-width: 135px; opacity: 0.95; }
        .hero-section { margin-bottom: 35px; }
        .hero-main-img { width: 85%; height: auto; margin: 0 auto 20px; display: block; }
        .hero-subtitle { color: var(--text-main); font-size: 15px; margin-bottom: 12px; font-weight: 800; display: block; line-height: 1.5; letter-spacing: 0.5px; }
        .hero-label { color: var(--primary); letter-spacing: 4px; font-size: 14px; font-weight: 700; display: block; }

        input {
            display: block; width: 100%; padding: 18px; font-size: 18px; border: 2px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px; outline: none; background: rgba(255, 255, 255, 0.8); margin-bottom: 15px; text-align: center;
        }

        button {
            display: block; width: 100%; padding: 18px; background: var(--primary); color: white;
            font-size: 20px; font-weight: 700; border: none; border-radius: 18px; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4); margin-bottom: 14px;
        }

        .welcome-msg { color: var(--text-sub); font-size: 22px; margin-bottom: 30px; }
        #resNameBold { color: var(--text-main); font-weight: 900; font-size: 32px; border-bottom: 3px solid var(--primary); }
        .seat-num { font-size: 62px; font-weight: 900; color: var(--success); display: block; }

        .btn-map { background: var(--accent); }
        .btn-schedule { background: var(--text-main); }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(15px);
            flex-direction: column;
        }

        .modal-header {
            height: 60px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: 800; letter-spacing: 2px;
        }

        .map-viewer {
            flex: 1; width: 100%; overflow: auto;
            display: flex; align-items: center; justify-content: center;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            width: 90vh; height: 95vw;
            transform: rotate(90deg);
            object-fit: contain;
            flex-shrink: 0;
        }

        .modal-footer {
            height: 100px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to top, black, transparent);
        }

        .close-btn {
            background: var(--error); color: white; border: none;
            padding: 12px 60px; border-radius: 30px; font-size: 16px;
            font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .schedule-list { text-align: left; margin: 25px 0; max-height: 380px; overflow-y: auto; }
        .schedule-item { display: flex; padding: 16px 0; border-bottom: 1px dashed rgba(0,0,0,0.08); align-items: center; }
        .time { font-weight: 800; color: var(--primary); min-width: 105px; font-size: 15px; }
        .event { color: var(--text-main); font-size: 15px; font-weight: 600; }
        .error-msg { color: var(--error); font-size: 14px; margin-bottom: 15px; display: none; font-weight: 700; }
        .reset-link { margin-top: 25px; font-size: 14px; color: var(--text-sub); cursor: pointer; display: inline-block; font-weight: 600; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText" style="font-weight: 600; letter-spacing: 1px;">正在加载名单...</p>
    </div>

    <div id="signinPage" class="card fade-in" style="display: block;">
        <div class="hero-section">
            <img src="main_title.png" alt="标题" class="hero-main-img">
            <span class="hero-subtitle">太平洋寿险辽宁分公司2025-2026年度表彰会</span>
            <span class="hero-label">签到确认 · SIGN IN</span>
        </div>
        <div>
            <input type="text" id="nameInput" placeholder="请输入姓名进行签到" autocomplete="off" onfocus="hideError()">
            <div id="errorMsg" class="error-msg">未找到名单信息，请核对后输入</div>
            <button id="signinBtn" onclick="handleSignin()">立即签到</button>
        </div>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <div id="resultPage" class="card fade-in">
        <p class="welcome-msg">欢迎您，<span id="resNameBold">--</span></p>
        <div style="background: rgba(16, 185, 129, 0.1); padding: 40px 15px; border-radius: 28px; margin-bottom: 35px; border: 1px solid rgba(16, 185, 129, 0.2);">
            <span style="font-size: 16px; color: #166534; display: block; margin-bottom: 15px; font-weight: 700;">26日 | 表彰&晚宴座次：</span>
            <span class="seat-num" id="resSeat">--</span>
        </div>
        <button class="btn-map" onclick="openMap()">查看现场座次分布图</button>
        <button class="btn-schedule" onclick="showDirect('schedulePage')">查看大会日程</button>
        <span class="reset-link" onclick="showDirect('signinPage')">重新查询</span>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <div id="schedulePage" class="card fade-in">
        <h2 style="font-size: 22px; font-weight: 800; color: var(--text-main); margin-bottom: 20px;">大会日程</h2>
        <div class="schedule-list">
            <div class="schedule-item"><span class="time">14:00 前</span><span class="event">报道签到</span></div>
            <div class="schedule-item"><span class="time">14:40-15:21</span><span class="event">峰会开场</span></div>
            <div class="schedule-item"><span class="time">15:21-17:00</span><span class="event">表彰环节</span></div>
            <div class="schedule-item"><span class="time">17:00-17:15</span><span class="event">2026-2027峰会章程</span></div>
            <div class="schedule-item"><span class="time">17:15-17:30</span><span class="event">35周年活动仪式</span></div>
            <div class="schedule-item"><span class="time">17:30-18:00</span><span class="event">休息</span></div>
            <div class="schedule-item"><span class="time">18:00-20:00</span><span class="event">表彰晚宴</span></div>
        </div>
        <button onclick="showDirect('resultPage')">返回个人信息</button>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <div id="mapModal" class="modal">
        <div class="modal-header">表彰及晚宴座位图</div>
        <div class="map-viewer">
            <img src="seat_map.png" class="modal-content" alt="座次分布图">
        </div>
        <div class="modal-footer">
            <button class="close-btn" onclick="closeMap()">退出查看</button>
        </div>
    </div>

    <script>
        // 全局变量
        let seatData = {};

        // 页面初始化时加载外部 JSON
        async function initSystem() {
            try {
                // 使用时间戳防止缓存
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('名单加载失败');

                const rawData = await response.json();

                // 数据清洗：去除姓名首尾空格
                seatData = {};
                for (let name in rawData) {
                    seatData[name.trim()] = rawData[name];
                }
                console.log("名单同步成功，人数：" + Object.keys(seatData).length);
            } catch (error) {
                console.error(error);
                alert("名单文件(data.json)缺失或损坏，请联系管理员！");
            }
        }

        // 执行初始化
        initSystem();

        function handleSignin() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim(); // 去除用户输入的空格
            const error = document.getElementById('errorMsg');
            const loader = document.getElementById('loadingOverlay');
            const loadText = document.getElementById('loadingText');

            if (name === "") { alert("请输入姓名"); return; }

            // 检查名单是否已加载
            if (Object.keys(seatData).length === 0) {
                alert("正在尝试连接名单库，请稍后再试...");
                initSystem();
                return;
            }

            loadText.innerText = "签到中...";
            loader.style.display = 'flex';

            setTimeout(() => {
                if (seatData[name]) {
                    document.getElementById('resNameBold').innerText = name;
                    document.getElementById('resSeat').innerText = seatData[name];
                    error.style.display = 'none';
                    showDirect('resultPage');
                } else {
                    error.style.display = 'block';
                }
                loader.style.display = 'none';
            }, 1000);
        }

        // 通用页面切换
        function showDirect(pageId) {
            document.querySelectorAll('.card').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            window.scrollTo(0,0);
        }

        // 弹窗控制
        function openMap() { document.getElementById('mapModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeMap() { document.getElementById('mapModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

        // 回车键监听
        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSignin();
        });
    </script>
</body>
</html>
